name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi==0.115.4 python-multipart==0.0.9 uvicorn==0.30.6 httpx==0.27.2

      - name: Compile backend sources
        run: python -m compileall deployment/app

      - name: Run backend unit and API smoke tests
        run: PYTHONPATH=deployment python -m unittest discover -s deployment/tests -p "test_*.py"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: ./front-end
        run: npm ci

      - name: Build frontend
        working-directory: ./front-end
        run: npm run build
